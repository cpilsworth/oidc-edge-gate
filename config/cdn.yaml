# CDN routing snippet — merge into your AEM project's cdn.yaml.
#
# This points all traffic for the protected host at the edge function instead of
# sending it straight to origin. The function decides, per request, whether to
# pass the request through to origin or to run the OIDC flow.

kind: "CDN"
version: "1"
data:
  # Route all traffic for the protected host through the gate.
  # The originName convention is `edgefunction-<service-name>` where the service
  # name matches the `name:` in edgeFunctions.yaml.
  originSelectors:
    rules:
      - name: route-to-oidc-edge-gate
        when:
          reqProperty: hostname
          equals: www.example.com
        action:
          type: selectAemOrigin
          originName: edgefunction-oidc-edge-gate

  # The origin the function forwards authenticated requests to. The backend name
  # ("origin") must match what the function passes to fetch(..., { backend }).
  # This is the EDS delivery host (*.aem.live), NOT the AEM publish tier — the
  # function speaks the EDS BYO-CDN contract (Host rewrite, X-Forwarded-Host,
  # X-Push-Invalidation) to it.
  origins:
    - name: origin
      domain: main--<site>--<org>.aem.live
