# Fastly Compute service manifest.
#
# AEM Edge Functions run on the Fastly Compute JavaScript runtime, so this file
# lets you build and test the function locally with the Fastly CLI before
# wiring it into AEM via edgeFunctions.yaml / cdn.yaml. The `local_server`
# block below mirrors the resources that AEM provides as ConfigStore / Secrets /
# KV at runtime.

authors = ["chrisp@adobe.com"]
description = "OIDC relying-party gate that validates access on every request"
language = "javascript"
manifest_version = 3
name = "oidc-edge-gate"
service_id = ""

[scripts]
  build = "npm run build"

# --- Backends ----------------------------------------------------------------
# `origin`  -> the site we are protecting: the EDS delivery host (*.aem.live),
#              NOT the AEM publish tier. The function speaks the EDS BYO-CDN
#              contract to it.
# `idp`     -> the OpenID Provider (token + JWKS endpoints), used only during
#              the auth-code flow, never on cached/authenticated requests.
[local_server]
  [local_server.backends]
    [local_server.backends.origin]
      url = "http://main--authz--cpilsworth.aem.live/"
    [local_server.backends.idp]
      url = "https://dev-37naouno.us.auth0.com"

  # NOTE: config_stores / secret_stores / kv_stores are intentionally NOT defined
  # for local dev. This mirrors the AEM *sandbox* program (which does not provision
  # those stores): `new ConfigStore/SecretStore/KVStore` throw, loadConfig falls
  # back to the build-time values in src/embedded-config.js, and there is a single
  # source of truth for local + sandbox. To instead exercise the store-backed path
  # locally (simulating a provisioned, non-sandbox environment), re-add:
  #   [local_server.config_stores.config_default] format="json" file="config/local.config.json"
  #   [local_server.secret_stores.secret_default] (key/data for client_secret + session_hmac_key)
  #   [local_server.kv_stores.kv_default] (key/data warmup="{}")
