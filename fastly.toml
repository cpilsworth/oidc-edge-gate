# Fastly Compute service manifest.
#
# AEM Edge Functions run on the Fastly Compute JavaScript runtime, so this file
# lets you build and test the function locally with the Fastly CLI before
# wiring it into AEM via edgeFunctions.yaml / cdn.yaml. The `local_server`
# block below mirrors the resources that AEM provides as ConfigStore / Secrets /
# KV at runtime.

authors = ["chrisp@adobe.com"]
description = "OIDC relying-party gate that validates access on every request"
language = "javascript"
manifest_version = 3
name = "oidc-edge-gate"
service_id = ""

[scripts]
  build = "npm run build"

# --- Backends ----------------------------------------------------------------
# `origin`  -> the site we are protecting: the EDS delivery host (*.aem.live),
#              NOT the AEM publish tier. The function speaks the EDS BYO-CDN
#              contract to it.
# `idp`     -> the OpenID Provider (token + JWKS endpoints), used only during
#              the auth-code flow, never on cached/authenticated requests.
[local_server]
  [local_server.backends]
    [local_server.backends.origin]
      url = "https://main--az-poc-ch--hmehta-adobe.aem.live"
    [local_server.backends.idp]
      url = "https://dev-37naouno.us.auth0.com"

  # ConfigStore -> non-secret OIDC settings (issuer, client_id, routes, policy).
  # The platform always names this store `config_default` (fixed, not renameable).
  [local_server.config_stores]
    [local_server.config_stores.config_default]
      format = "json"
      file = "config/local.config.json"

  # Secret store -> client secret + the HMAC key used to sign session cookies.
  # Always named `secret_default` by the platform. Use `fastly secret-store` in
  # production; this is plaintext for local dev only.
  [local_server.secret_stores]
    [[local_server.secret_stores.secret_default]]
      key = "client_secret"
      data = "dev-client-secret-change-me"
    [[local_server.secret_stores.secret_default]]
      key = "session_hmac_key"
      data = "dev-session-signing-key-at-least-32-bytes-long"

  # KV store -> reused for two purposes: (1) caches the OIDC discovery doc + JWKS
  # so token validation at the callback does not burn backend requests (AEM caps
  # fetch() at 32 per exec), and (2) holds the N9 single-use state-replay marker
  # that makes each auth-code `state` redeemable only once. Provisioned by
  # `kvs: true` in edgeFunctions.yaml; the platform always names it `kv_default`.
  [local_server.kv_stores]
    [[local_server.kv_stores.kv_default]]
      key = "warmup"
      data = "{}"
